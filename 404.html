<html>
  <body>
    <div>404</div>
    <script>
      window.onload = () => {
        const startTime = Date.now();
        const pathname = location.pathname;
        
        fetch('/db.json').then(res => res.json()).then(db => {
          const timeout = Date.now() - startTime;
          if (pathname in db) {
            setTimeout(() => {
              location.href = db[pathname];
            }, timeout > 1000 ? 1000 : timeout);
          }
        });
      }
    </script>
  </body>
</html>
